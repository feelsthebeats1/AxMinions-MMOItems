name: "<#00AAFF>Miner <white>Minion"

entity:
  name: "<level_color>[<level>] <#00AAFF>Miner <white>Minion <gray>[<owner>]"

tool:
  material:
    - "WOODEN_PICKAXE"
    - "STONE_PICKAXE"
    - "GOLDEN_PICKAXE"
    - "IRON_PICKAXE"
    - "DIAMOND_PICKAXE"
    - "NETHERITE_PICKAXE"

# Can be: sphere, line, face, asphere, void
# If set to sphere: checks blocks in a sphere with the range of the minion as radius (Most resource intensive, the larger the radius, the worse)
# If set to line: checks blocks in all 4 directions from the minion in the range of the minion (Best performance to blocks broken ratio)
# If set to face: checks blocks only in the facing of the minion (Least resource intensive)
# If set to asphere: checks blocks in a sphere with the range of the minion as the radius, around the minion
# Only switch to asphere mode, if you know what you're doing,
# as it may cause some issues due to states being concurrently modified!
# If set to void: generates items directly without needing blocks to break (uses void-drops config below)
#   - Still requires a pickaxe tool
#   - Still uses speed, efficiency enchantment, and range
#   - Still damages tool durability normally
#   - Still counts actions / upgrades work the same
#   - Only difference: items are generated directly instead of needing surrounding blocks
mode: line

# Can be generator or whitelist
# with generator mode the minion only mines blocks that are from a stone generator (water & lava on the sides of the block)
# with whitelist mode, it will break all blocks that match the whitelist
# Note: break/whitelist settings are ignored in void mode
break: generator

whitelist:
  - "stone"
  - "cobblestone"
  - "iron_ore"
  - "gold_ore"
  - "redstone_ore"

# Void mode drops - only used when mode: void (configure inside each upgrade level)
# Each tick, the minion independently rolls each material based on its drop chance.
# Drop chance is calculated as: weight / totalWeight (e.g., weight=60, totalWeight=100 => 60%)
# Format:
# void-drops:
#   - MATERIAL_NAME: weight        (e.g. COBBLESTONE: 60)
#   - MMO_TYPE:MMO_ID: weight      (e.g. GEM_STONE:PERFECT_RUBY: 1)
# The Fortune enchantment on the tool increases the amount of each dropped item.

